<main class="module-container" role="main" aria-label="Metreküp hesaplama aracı">

<section class="metrekup-container" aria-labelledby="metrekup-title">
    <div class="metrekup-body">

        <div id="hesaplama-container" class="metrekup-main-container">
            
            <header class="metrekup-list-header">
                <div class="metrekup-header-wrapper">
                    <div>
                        <h1 id="metrekup-title" class="metrekup-list-title">{{mainTitle}}</h1>
                        <p class="metrekup-list-subtitle">{{mainSubtitle}}</p>
                    </div>
                    <div class="metrekup-buttons">
                        <button type="button" onclick="addItem()" class="metrekup-btn-add" aria-label="Yeni eşya ekle">{{btnAddItem}}</button>
                        <button type="button" onclick="clearAll()" class="metrekup-btn-clear" aria-label="Tüm verileri temizle">{{btnClear}}</button>
                    </div>
                </div>
            </header>
            
            <section id="esya-listesi" class="metrekup-items-grid" aria-label="Eşya listesi">
                
            </section>
            
            <section class="metrekup-bottom-section" aria-labelledby="results-title">
                <div class="metrekup-results-section">
                    <header class="metrekup-results-header">
                        <h2 id="results-title" class="metrekup-results-title">{{resultsTitle}}</h2> 
                        <p class="metrekup-results-subtitle">{{resultsSubtitle}}</p>
                    </header>
                    <div class="metrekup-results-grid">
                        <div class="metrekup-result-card">
                            <div class="metrekup-result-icon">📦</div>
                            <div class="metrekup-result-label">{{labelTotalVolume}}</div>
                            <div class="metrekup-result-value">
                                <span id="total-volume">0</span> <span class="metrekup-result-unit">m³</span>
                            </div>
                        </div>
                        <div class="metrekup-result-card">
                            <div class="metrekup-result-icon">⚖️</div>
                            <div class="metrekup-result-label">{{labelTotalWeight}}</div>
                            <div class="metrekup-result-value">
                                <span id="total-weight">0</span> <span class="metrekup-result-unit">kg</span>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>
</section>
</main>




<script>
var items = [];
var itemCounter = 0;

setTimeout(function() {
    initializeCalculator();
}, 100);

function initializeCalculator() {

    for (var i = 1; i <= 3; i++) {
        addItem();
    }
    updateTotals();
}

function addItem() {
    itemCounter++;
    var container = document.getElementById('esya-listesi');
    var itemId = itemCounter;
    
    var removeButton = '';
    if (itemId > 3) {
        removeButton = '<button type="button" onclick="removeItem(' + itemId + ')" class="metrekup-btn-remove" aria-label="Eşyayı kaldır">×</button>';
    }
    
    var itemHtml = '<div class="metrekup-item-card" id="item-' + itemId + '">' +
        '<div class="metrekup-item-header">' +
            '<div class="metrekup-item-title-wrapper">' +
                '<div class="metrekup-item-number">' + itemId + '</div>' +
                '<h3 class="metrekup-item-title">{{itemTitle}} ' + itemId + '</h3>' +
            '</div>' +
            removeButton +
        '</div>' +
        '<div class="metrekup-inputs-grid">' +
            '<div class="metrekup-input-group">' +
                '<label class="metrekup-input-label" for="length-' + itemId + '">{{labelLength}}</label>' +
                '<input type="number" id="length-' + itemId + '" name="length-' + itemId + '" placeholder="0" step="0.1" oninput="calculateItem(' + itemId + ')" class="metrekup-input" aria-label="{{labelLength}}">' +
            '</div>' +
            '<div class="metrekup-input-group">' +
                '<label class="metrekup-input-label" for="width-' + itemId + '">{{labelWidth}}</label>' +
                '<input type="number" id="width-' + itemId + '" name="width-' + itemId + '" placeholder="0" step="0.1" oninput="calculateItem(' + itemId + ')" class="metrekup-input" aria-label="{{labelWidth}}">' +
            '</div>' +
            '<div class="metrekup-input-group">' +
                '<label class="metrekup-input-label" for="height-' + itemId + '">{{labelHeight}}</label>' +
                '<input type="number" id="height-' + itemId + '" name="height-' + itemId + '" placeholder="0" step="0.1" oninput="calculateItem(' + itemId + ')" class="metrekup-input" aria-label="{{labelHeight}}">' +
            '</div>' +
            '<div class="metrekup-input-group">' +
                '<label class="metrekup-input-label" for="quantity-' + itemId + '">{{labelQuantity}}</label>' +
                '<input type="number" id="quantity-' + itemId + '" name="quantity-' + itemId + '" placeholder="1" step="1" min="1" value="1" oninput="calculateItem(' + itemId + ')" class="metrekup-input" aria-label="{{labelQuantity}}">' +
            '</div>' +
            '<div class="metrekup-input-group metrekup-weight-group">' +
                '<label class="metrekup-input-label" for="weight-' + itemId + '">{{labelWeight}}</label>' +
                '<input type="number" id="weight-' + itemId + '" name="weight-' + itemId + '" placeholder="0" step="0.1" oninput="calculateItem(' + itemId + ')" class="metrekup-input" aria-label="{{labelWeight}}">' +
            '</div>' +
            '<div class="metrekup-input-group metrekup-volume-group">' +
                '<label class="metrekup-input-label" for="item-volume-' + itemId + '">{{labelItemVolume}}</label>' +
                '<div class="metrekup-volume-display">' +
                    '<span id="item-volume-' + itemId + '">0.00</span>' +
                    '<span class="metrekup-volume-unit">m³</span>' +
                '</div>' +
            '</div>' +
        '</div>' +
    '</div>';
    
    container.insertAdjacentHTML('beforeend', itemHtml);

    items.push({
        id: itemId,
        quantity: 1,
        length: 0,
        width: 0,
        height: 0,
        weight: 0,
        volume: 0
    });
}

function removeItem(itemId) {
    var itemElement = document.getElementById('item-' + itemId);
    if (itemElement) {
        itemElement.remove();
    }

    items = items.filter(function(item) {
        return item.id !== itemId;
    });

    renumberItems();
    
    updateTotals();
}

function renumberItems() {
    var container = document.getElementById('esya-listesi');
    var allItems = container.querySelectorAll('.metrekup-item-card');

    for (var i = 0; i < allItems.length; i++) {
        var itemElement = allItems[i];
        var newNumber = i + 1;
        var oldId = itemElement.id.replace('item-', '');
        var newId = newNumber;

        if (parseInt(oldId) !== newId) {

            itemElement.id = 'item-' + newId;

            var numberElement = itemElement.querySelector('.metrekup-item-number');
            if (numberElement) {
                numberElement.textContent = newId;
            }

            var titleElement = itemElement.querySelector('.metrekup-item-title');
            if (titleElement) {
                titleElement.textContent = '{{itemTitle}} ' + newId;
            }

            var lengthInput = itemElement.querySelector('#length-' + oldId);
            if (lengthInput) {
                lengthInput.id = 'length-' + newId;
                lengthInput.setAttribute('oninput', 'calculateItem(' + newId + ')');
            }
            
            var widthInput = itemElement.querySelector('#width-' + oldId);
            if (widthInput) {
                widthInput.id = 'width-' + newId;
                widthInput.setAttribute('oninput', 'calculateItem(' + newId + ')');
            }
            
            var heightInput = itemElement.querySelector('#height-' + oldId);
            if (heightInput) {
                heightInput.id = 'height-' + newId;
                heightInput.setAttribute('oninput', 'calculateItem(' + newId + ')');
            }
            
            var quantityInput = itemElement.querySelector('#quantity-' + oldId);
            if (quantityInput) {
                quantityInput.id = 'quantity-' + newId;
                quantityInput.setAttribute('oninput', 'calculateItem(' + newId + ')');
            }
            
            var weightInput = itemElement.querySelector('#weight-' + oldId);
            if (weightInput) {
                weightInput.id = 'weight-' + newId;
                weightInput.setAttribute('oninput', 'calculateItem(' + newId + ')');
            }

            var volumeElement = itemElement.querySelector('#item-volume-' + oldId);
            if (volumeElement) {
                volumeElement.id = 'item-volume-' + newId;
            }

            var removeButton = itemElement.querySelector('.metrekup-btn-remove');
            if (removeButton) {
                removeButton.setAttribute('onclick', 'removeItem(' + newId + ')');
            } else if (newId > 3) {

                var headerElement = itemElement.querySelector('.metrekup-item-header');
                if (headerElement) {
                    var newRemoveButton = '<button onclick="removeItem(' + newId + ')" class="metrekup-btn-remove">×</button>';
                    var titleDiv = headerElement.querySelector('div');
                    if (titleDiv && titleDiv.nextSibling) {
                        titleDiv.parentNode.insertAdjacentHTML('beforeend', newRemoveButton);
                    } else {
                        headerElement.insertAdjacentHTML('beforeend', newRemoveButton);
                    }
                }
            }

            var itemIndex = items.findIndex(function(item) {
                return item.id === parseInt(oldId);
            });
            if (itemIndex !== -1) {

                var lengthValue = lengthInput ? parseFloat(lengthInput.value) || 0 : 0;
                var widthValue = widthInput ? parseFloat(widthInput.value) || 0 : 0;
                var heightValue = heightInput ? parseFloat(heightInput.value) || 0 : 0;
                var quantityValue = quantityInput ? parseInt(quantityInput.value) || 1 : 1;
                var weightValue = weightInput ? parseFloat(weightInput.value) || 0 : 0;

                var singleVolume = (lengthValue * widthValue * heightValue) / 1000000;
                var totalVolume = singleVolume * quantityValue;
                var totalWeight = weightValue * quantityValue;

                items[itemIndex] = {
                    id: newId,
                    quantity: quantityValue,
                    length: lengthValue,
                    width: widthValue,
                    height: heightValue,
                    weight: totalWeight,
                    singleWeight: weightValue,
                    volume: totalVolume,
                    singleVolume: singleVolume
                };

                if (volumeElement) {
                    volumeElement.textContent = totalVolume.toFixed(2);
                }
            }
        } else {

            var removeButton = itemElement.querySelector('.metrekup-btn-remove');
            if (newId <= 3 && removeButton) {
                removeButton.remove();
            } else if (newId > 3 && !removeButton) {
                var headerElement = itemElement.querySelector('.metrekup-item-header');
                if (headerElement) {
                    var newRemoveButton = '<button onclick="removeItem(' + newId + ')" class="metrekup-btn-remove">×</button>';
                    headerElement.insertAdjacentHTML('beforeend', newRemoveButton);
                }
            }
        }
    }
}

function calculateItem(itemId) {
    var quantityInput = document.getElementById('quantity-' + itemId);
    var lengthInput = document.getElementById('length-' + itemId);
    var widthInput = document.getElementById('width-' + itemId);
    var heightInput = document.getElementById('height-' + itemId);
    var weightInput = document.getElementById('weight-' + itemId);
    
    if (!quantityInput || !lengthInput || !widthInput || !heightInput || !weightInput) {
        return;
    }
    
    var quantity = parseInt(quantityInput.value) || 1;
    var length = parseFloat(lengthInput.value) || 0;
    var width = parseFloat(widthInput.value) || 0;
    var height = parseFloat(heightInput.value) || 0;
    var weight = parseFloat(weightInput.value) || 0;

    var singleVolume = (length * width * height) / 1000000;
    var totalVolume = singleVolume * quantity;
    var totalWeight = weight * quantity;

    var itemIndex = items.findIndex(function(item) {
        return item.id === itemId;
    });
    if (itemIndex !== -1) {
        items[itemIndex] = {
            id: itemId,
            quantity: quantity,
            length: length,
            width: width,
            height: height,
            weight: totalWeight,
            singleWeight: weight,
            volume: totalVolume,
            singleVolume: singleVolume
        };
    } else {
        items.push({
            id: itemId,
            quantity: quantity,
            length: length,
            width: width,
            height: height,
            weight: totalWeight,
            singleWeight: weight,
            volume: totalVolume,
            singleVolume: singleVolume
        });
    }

    updateItemVolume(itemId, totalVolume);
    
    updateTotals();
}

function updateItemVolume(itemId, volume) {
    var volumeElement = document.getElementById('item-volume-' + itemId);
    if (volumeElement) {
        volumeElement.textContent = volume.toFixed(2);
    }
}

function updateTotals() {
    var totalVolumeElement = document.getElementById('total-volume');
    var totalWeightElement = document.getElementById('total-weight');
    
    if (!totalVolumeElement || !totalWeightElement) {
        return;
    }
    
    var totalVolume = items.reduce(function(sum, item) {
        return sum + (item.volume || 0);
    }, 0);
    var totalWeight = items.reduce(function(sum, item) {
        return sum + (item.weight || 0);
    }, 0);
    
    totalVolumeElement.textContent = totalVolume.toFixed(2);
    totalWeightElement.textContent = totalWeight.toFixed(2);
}

function clearAll() {

    items.forEach(function(item) {
        var quantityInput = document.getElementById('quantity-' + item.id);
        var lengthInput = document.getElementById('length-' + item.id);
        var widthInput = document.getElementById('width-' + item.id);
        var heightInput = document.getElementById('height-' + item.id);
        var weightInput = document.getElementById('weight-' + item.id);
        
        if (quantityInput) quantityInput.value = '1';
        if (lengthInput) lengthInput.value = '';
        if (widthInput) widthInput.value = '';
        if (heightInput) heightInput.value = '';
        if (weightInput) weightInput.value = '';
    });

    items = items.map(function(item) {

        updateItemVolume(item.id, 0);
        
        return {
            id: item.id,
            quantity: 1,
            length: 0,
            width: 0,
            height: 0,
            weight: 0,
            singleWeight: 0,
            volume: 0,
            singleVolume: 0
        };
    });
    
    updateTotals();
}

console.log('Metreküp hesaplama modülü yüklendi');
</script>
