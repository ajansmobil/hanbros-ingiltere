<main class="indirim-ceki-form" role="main" aria-labelledby="form-title">
  <div class="form-container">
    <header class="form-header">
      <h1 id="form-title">{{title}}</h1>
      <p>{{subtitle}}</p>
    </header>
    <form id="indirimForm" class="indirim-form" aria-label="İndirim çeki formu" novalidate>
      <div class="form-group">
        <label for="kod">İndirim Kodu</label>
        <input type="text" id="kod" name="kod" readonly value="" aria-label="İndirim kodu" aria-readonly="true">
      </div>
      <div class="form-group">
        <label for="adsoyad">Ad Soyad <span class="required" aria-label="Zorunlu alan">*</span></label>
        <input type="text" id="adsoyad" name="adsoyad" required placeholder="Adınız ve soyadınız" aria-required="true" autocomplete="name">
      </div>
      <div class="form-group">
        <label for="telefon">Telefon <span class="required" aria-label="Zorunlu alan">*</span></label>
        <input type="tel" id="telefon" name="telefon" required placeholder="+44 XX XXX XX XX" aria-required="true" autocomplete="tel">
      </div>
      <div class="form-group">
        <label for="email">E-posta <span class="required" aria-label="Zorunlu alan">*</span></label>
        <input type="email" id="email" name="email" required placeholder="ornek@email.com" aria-required="true" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="mesaj">Mesaj (Opsiyonel)</label>
        <textarea id="mesaj" name="mesaj" rows="4" placeholder="Mesajınızı buraya yazabilirsiniz..." aria-label="Mesaj alanı"></textarea>
      </div>
      <div class="form-group">
        <button type="submit" class="submit-btn" aria-label="WhatsApp ile gönder">
          <span>WhatsApp ile Gönder</span>
          <img src="/src/icon/whatsapp.png" alt="WhatsApp" height="24" width="24" loading="lazy">
        </button>
      </div>
    </form>
  </div>
</main>

<style>
  .indirim-ceki-form {
    width: 100%;
    max-width: 600px;
    margin: 40px auto;
    padding: 20px;
  }

  .form-container {
    background: #ffffff;
    border-radius: 15px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
    padding: 40px;
  }

  .form-header {
    text-align: center;
    margin-bottom: 30px;
  }

  .form-header h2 {
    color: #006B65;
    font-size: 28px;
    margin-bottom: 10px;
    font-weight: 600;
  }

  .form-header p {
    color: #666;
    font-size: 16px;
  }

  .indirim-form {
    width: 100%;
  }

  .form-group {
    margin-bottom: 25px;
  }

  .form-group label {
    display: block;
    margin-bottom: 8px;
    color: #333;
    font-weight: 500;
    font-size: 14px;
  }

  .required {
    color: #e74c3c;
  }

  .form-group input,
  .form-group textarea {
    width: 100%;
    padding: 12px 15px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-size: 16px;
    transition: border-color 0.3s;
    box-sizing: border-box;
    font-family: inherit;
  }

  .form-group input:focus,
  .form-group textarea:focus {
    outline: none;
    border-color: #006B65;
  }

  .form-group input[readonly] {
    background-color: #f5f5f5;
    cursor: not-allowed;
    font-weight: 600;
    color: #006B65;
  }

  .form-group textarea {
    resize: vertical;
    min-height: 100px;
  }

  .submit-btn {
    width: 100%;
    padding: 15px 20px;
    background-color: #25D366;
    color: #ffffff;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background-color 0.3s;
  }

  .submit-btn:hover {
    background-color: #20ba5a;
  }

  .submit-btn:active {
    transform: scale(0.98);
  }

  .submit-btn img {
    vertical-align: middle;
  }

  @media (max-width: 768px) {
    .indirim-ceki-form {
      padding: 15px;
      margin: 20px auto;
    }

    .form-container {
      padding: 25px 20px;
    }

    .form-header h2 {
      font-size: 24px;
    }
  }

  
  .error-container {
    background: linear-gradient(135deg, #fff5f5 0%, #ffe5e5 100%);
    border: 2px solid #feb2b2;
    border-radius: 15px;
    padding: 50px 40px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(254, 178, 178, 0.3);
    animation: fadeIn 0.3s ease-in;
  }

  .error-icon {
    font-size: 64px;
    margin-bottom: 20px;
    animation: shake 0.5s ease-in-out;
  }

  .error-container h3 {
    color: #c53030;
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 15px;
    letter-spacing: -0.5px;
  }

  .error-container p {
    color: #742a2a;
    font-size: 16px;
    line-height: 1.6;
    margin-bottom: 15px;
  }

  .error-details {
    background: rgba(255, 255, 255, 0.7);
    border-left: 4px solid #f56565;
    padding: 15px 20px;
    margin-top: 20px;
    border-radius: 8px;
    color: #742a2a;
    font-size: 14px;
    text-align: left;
  }

  
  .loading-container {
    background: linear-gradient(135deg, #f0fff4 0%, #c6f6d5 100%);
    border: 2px solid #9ae6b4;
    border-radius: 15px;
    padding: 50px 40px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(154, 230, 180, 0.3);
    animation: fadeIn 0.3s ease-in;
  }

  .loading-spinner {
    width: 50px;
    height: 50px;
    border: 5px solid #9ae6b4;
    border-top-color: #006B65;
    border-radius: 50%;
    margin: 0 auto 20px;
    animation: spin 1s linear infinite;
  }

  .loading-container h3 {
    color: #006B65;
    font-size: 22px;
    font-weight: 600;
    margin: 0;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(-10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-10px); }
    75% { transform: translateX(10px); }
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>

<script>
(function() {
  var urlParams = new URLSearchParams(window.location.search);
  var kodParam = urlParams.get('id');
  
  var formContainer = document.querySelector('.indirim-ceki-form');
  var originalFormHTML = formContainer.innerHTML;
  
  if (!kodParam) {
    formContainer.innerHTML = '<div class="error-container"><div class="error-icon">⚠️</div><h3>Geçersiz Link</h3><p>İndirim çeki kodu bulunamadı. Lütfen doğru linki kullanın.</p></div>';
    return;
  }
  formContainer.innerHTML = '<div class="loading-container"><div class="loading-spinner"></div><h3>Kod kontrol ediliyor...</h3></div>';
  fetch('/module/rzqplw/codelist.json')
    .then(function(response) {
      if (!response.ok) {
        throw new Error('Kod listesi yüklenemedi');
      }
      return response.json();
    })
    .then(function(kodListesi) {
      var kodGecerli = false;
      for (var i = 0; i < kodListesi.length; i++) {
        if (kodListesi[i].url === kodParam) {
          kodGecerli = true;
          break;
        }
      }
      if (!kodGecerli) {
        formContainer.innerHTML = '<div class="error-container"><div class="error-icon">❌</div><h3>Geçersiz Kod</h3><p>Girdiğiniz indirim çeki kodu geçersizdir. Lütfen doğru kodu kontrol ediniz.</p><div class="error-details">İndirim çeki kodunuzu fuardan aldığınız kart veya belgeden kontrol edebilirsiniz.</div></div>';
        return;
      }
      formContainer.innerHTML = originalFormHTML;
      var kodInput = document.getElementById('kod');
      if (kodInput) {
        kodInput.value = kodParam;
      }
      var form = document.getElementById('indirimForm');
      if (form) {
        form.addEventListener('submit', function(e) {
          e.preventDefault();
          
          var adsoyad = document.getElementById('adsoyad').value.trim();
          var telefon = document.getElementById('telefon').value.trim();
          var email = document.getElementById('email').value.trim();
          var mesaj = document.getElementById('mesaj').value.trim();
          var kod = kodParam;
          if (!adsoyad || !telefon || !email) {
            alert('Lütfen zorunlu alanları doldurunuz.');
            return;
          }
          var whatsappMessage = '🎟️ *İndirim Çeki Formu*\n\n';
          whatsappMessage += '📋 *Kod:* ' + kod + '\n';
          whatsappMessage += '👤 *Ad Soyad:* ' + adsoyad + '\n';
          whatsappMessage += '📱 *Telefon:* ' + telefon + '\n';
          whatsappMessage += '📧 *E-posta:* ' + email + '\n';
          
          if (mesaj) {
            whatsappMessage += '💬 *Mesaj:* ' + mesaj + '\n';
          }
          var whatsappNumber = '905418504646';
          var encodedMessage = encodeURIComponent(whatsappMessage);
          var whatsappUrl = 'https://api.whatsapp.com/send/?phone=' + whatsappNumber + '&text=' + encodedMessage + '&app_absent=0';
          window.open(whatsappUrl, '_blank');
        });
      }
    })
    .catch(function(error) {
      console.error('Kod listesi yüklenemedi:', error);
      formContainer.innerHTML = '<div class="error-container"><div class="error-icon">⚠️</div><h3>Hata</h3><p>Kod listesi yüklenirken bir hata oluştu. Lütfen sayfayı yenileyin.</p></div>';
    });
})();
</script>
