<header class="modulex" role="banner">

  <div class="modulexbody">
    <a href="/{{lang}}/" aria-label="{{web-name}} home">
      <img src="/img/{{logo}}?v={{random}}" class="module-logo" alt="{{web-name}} Logo" width="300" height="auto" />
    </a>


    <div class="lang_telif">
      <nav class="modulextitlebodylang" aria-label="Language">
        {{langhtml}}
      </nav>

      <div class="header-actions">
        <nav class="contact-buttons" aria-label="Quick links">
         
         
            
          <a href="https://hanbros.poodify.com/" target="_blank" class="btn-track" title="{{gonder}} - {{trackPageTitle}}">
            <i class="icon" aria-hidden="true"><img src="/img/cmkhy5/e-link.png" alt="{{elink}}" width="50" ></i>
            <span>{{elink}}</span>
          </a>

         
         
          <a href="/{{lang}}/shipment-tracking/" class="btn-quote" title="{{gonder}} - {{trackPageTitle}}">
            <i class="icon" aria-hidden="true">🚛</i>
            <span>{{gonder}}</span>
          </a>


          <a href="/{{lang}}/get-a-quote/" class="btn-quote" title="{{teklifal}} - {{quotePageTitle}}">
            <i class="icon" aria-hidden="true">✏️</i>
            <span>{{teklifal}}</span>
          </a>
        </nav>
      </div>

    </div>
  </div>
  <nav class="modulexmenubody" role="navigation" aria-label="Main menu">
    <div class="modulexmenu">
      <button class="mobile-menu-toggle" aria-expanded="false" aria-label="Open or close menu"
        aria-controls="modulexmenulistbody">
        <span class="mobile-menu-toggle-icon" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </span>
      </button>
      <div class="mobile-menu-overlay" id="mobile-menu-overlay" aria-hidden="true"></div>
      <div class="modulexmenulistbody" id="modulexmenulistbody">
        <button class="mobile-menu-close" type="button" aria-label="Close menu" aria-controls="modulexmenulistbody">
          <span class="material-symbols-outlined" aria-hidden="true">close</span>
        </button>
        <div class="modulexmenulist">
          {{html}}
          <div class="mobile-lang-wrapper" role="navigation" aria-label="Mobile language">{{langhtml}}</div>
        </div>
      </div>
    </div>
  </nav>
</header>

    .modulexmenulist-menu--hasdropdown .dropdown-content-modulex > a:focus-visible {
      background-color: var(--mx-teal-mid);
      color: #ffffff !important;
      outline: none;
    }
  }
</style>
<script>
  setTimeout(function () {
    try {

      var toggle = document.querySelector(".mobile-menu-toggle");
      var menuBody = document.querySelector(".modulexmenulistbody");
      var overlay = document.querySelector(".mobile-menu-overlay");
      var closeButton = document.querySelector(".mobile-menu-close");

      if (!toggle || !menuBody) {
        return;
      }

      var mql = window.matchMedia("(max-width: 768px)");

      function openMenu() {
        closeAllSubmenus();
        if (menuBody) {
          menuBody.classList.add("is-visible");
        }
        if (overlay) {
          overlay.classList.add("active");
          overlay.setAttribute("aria-hidden", "false");
        }
        if (toggle) {
          toggle.classList.add("is-active");
          toggle.setAttribute("aria-expanded", "true");
        }

        document.body.style.overflow = "hidden";
      }

      function closeAllSubmenus() {
        if (!menuBody) {
          return;
        }
        var opened = menuBody.querySelectorAll(".modulexmenulist-menu.is-submenu-open");
        var si;
        for (si = 0; si < opened.length; si++) {
          opened[si].classList.remove("is-submenu-open");
          var tb = opened[si].querySelector(".modulex-submenu-toggle");
          if (tb) {
            tb.setAttribute("aria-expanded", "false");
          }
        }
      }

      function initMobileSubmenuToggles() {
        var toggles = menuBody.querySelectorAll(".modulex-submenu-toggle");
        var ti;
        for (ti = 0; ti < toggles.length; ti++) {
          toggles[ti].addEventListener("click", function (e) {
            e.preventDefault();
            e.stopPropagation();
            if (!mql.matches) {
              return;
            }
            var row = this.closest(".modulexmenulist-menu--hasdropdown");
            if (!row) {
              return;
            }
            var willOpen = !row.classList.contains("is-submenu-open");
            var allRows = menuBody.querySelectorAll(".modulexmenulist-menu--hasdropdown");
            var i;
            for (i = 0; i < allRows.length; i++) {
              allRows[i].classList.remove("is-submenu-open");
              var tbtn = allRows[i].querySelector(".modulex-submenu-toggle");
              if (tbtn) {
                tbtn.setAttribute("aria-expanded", "false");
              }
            }
            if (willOpen) {
              row.classList.add("is-submenu-open");
              this.setAttribute("aria-expanded", "true");
            }
          });
        }
      }
      initMobileSubmenuToggles();

      function closeMenu() {
        closeAllSubmenus();
        if (menuBody) {
          menuBody.classList.remove("is-visible");
          menuBody.classList.remove("swiping");
          menuBody.style.transform = "";
        }
        if (overlay) {
          overlay.classList.remove("active");
          overlay.setAttribute("aria-hidden", "true");
          overlay.style.opacity = "";
        }
        if (toggle) {
          toggle.classList.remove("is-active");
          toggle.setAttribute("aria-expanded", "false");
        }

        document.body.style.overflow = "";

        if (toggle) {
          toggle.focus();
        }
      }

      toggle.addEventListener("click", function (e) {
        e.preventDefault();
        e.stopPropagation();
        if (menuBody.classList.contains("is-visible")) {
          closeMenu();
        } else {
          openMenu();
        }
      });

      if (closeButton) {
        closeButton.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          closeMenu();
        });
      }

      if (overlay) {
        overlay.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopPropagation();
          closeMenu();
        });
      }

      var touchStartX = 0;
      var touchStartY = 0;
      var touchCurrentX = 0;
      var isSwiping = false;
      var swipeThreshold = 50; // Minimum çekme mesafesi (px)
      var menuWidth = 0;

      function getMenuWidth() {
        if (menuBody) {
          return menuBody.offsetWidth || window.innerWidth * 0.8;
        }
        return 320;
      }

      menuBody.addEventListener("touchstart", function (e) {
        if (!menuBody.classList.contains("is-visible")) {
          return;
        }
        var touch = e.touches[0];
        touchStartX = touch.clientX;
        touchStartY = touch.clientY;
        isSwiping = false;
        menuWidth = getMenuWidth();
      }, { passive: true });

      menuBody.addEventListener("touchmove", function (e) {
        if (!menuBody.classList.contains("is-visible")) {
          return;
        }
        var touch = e.touches[0];
        touchCurrentX = touch.clientX;
        var deltaX = touchCurrentX - touchStartX;
        var deltaY = Math.abs(touch.clientY - touchStartY);

        if (Math.abs(deltaX) > 10 && Math.abs(deltaX) > deltaY) {
          isSwiping = true;
          e.preventDefault();

          if (deltaX > 0) {
            menuBody.classList.add("swiping");
            var translateX = Math.min(deltaX, menuWidth);
            menuBody.style.transform = "translateX(" + translateX + "px)";

            if (overlay) {
              var opacity = 0.6 * (1 - deltaX / menuWidth);
              overlay.style.opacity = opacity;
            }
          }
        }
      }, { passive: false });

      menuBody.addEventListener("touchend", function (e) {
        if (!menuBody.classList.contains("is-visible")) {
          return;
        }
        
        if (isSwiping) {
          menuBody.classList.remove("swiping");
          var deltaX = touchCurrentX - touchStartX;

          if (deltaX > swipeThreshold) {
            closeMenu();
          } else {

            menuBody.style.transform = "";
            if (overlay) {
              overlay.style.opacity = "";
            }
          }
          
          isSwiping = false;
        }
      }, { passive: true });

      menuBody.addEventListener("touchcancel", function (e) {
        if (isSwiping) {
          menuBody.classList.remove("swiping");
          menuBody.style.transform = "";
          if (overlay) {
            overlay.style.opacity = "";
          }
          isSwiping = false;
        }
      }, { passive: true });

      menuBody.addEventListener("click", function (event) {
        var link = event.target.closest("a");
        var closeBtn = event.target.closest(".mobile-menu-close");
        if (link && !closeBtn) {
          closeMenu();
        }
      });

      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape" && menuBody && menuBody.classList.contains("is-visible")) {
          closeMenu();
        }
      });

      toggle.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          if (menuBody.classList.contains("is-visible")) {
            closeMenu();
          } else {
            openMenu();
          }
        }
      });

      function handleBreakpoint() {
        if (!mql.matches) {

          closeAllSubmenus();
          if (menuBody) {
            menuBody.classList.remove("is-visible");
          }
          if (overlay) {
            overlay.classList.remove("active");
            overlay.setAttribute("aria-hidden", "true");
          }
          if (toggle) {
            toggle.classList.remove("is-active");
            toggle.setAttribute("aria-expanded", "false");
          }
          document.body.style.overflow = "";
        }
      }

      if (typeof mql.addEventListener === "function") {
        mql.addEventListener("change", handleBreakpoint);
      } else if (typeof mql.addListener === "function") {
        mql.addListener(handleBreakpoint);
      }
      handleBreakpoint();
    } catch (error) {
      console.error("cmkhy5 mobile menu error:", error);
    }
  }, 100);
</script>
