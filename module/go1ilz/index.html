<main class="modulex-wrapper" role="main" aria-label="@product-categories@">
    <div class="modulex-container">
        <nav class="modulex-categories-list" id="categories-list" role="tablist"
            aria-label="@product-categories-label@"></nav>
        <section class="search-section" aria-label="@product-search-label@">
            <div class="search-wrapper">
                <div class="search-container" id="search-container">
                    <label for="search-input" class="sr-only">@product-search-label@</label>
                    <span class="material-symbols-outlined search-icon-inner" aria-hidden="true">search</span>
                    <input type="text" id="search-input" name="search" class="search-input"
                        placeholder="@product-search@" aria-label="@product-search-label@" autocomplete="off" />
                    <button type="button" class="material-symbols-outlined search-clear" id="search-clear"
                        style="display: none;" onclick="clearSearch()" aria-label="@clear-search@">close</button>
                </div>
                <div class="search-suggestions" id="search-suggestions" style="display: none;" role="listbox"
                    aria-label="@search-suggestions@"></div>
            </div>
        </section>
        <section class="modulex-categories-content" id="categories-content" aria-label="@product-list-label@"></section>
    </div>
    <aside class="modulex-total" id="total-counter" role="complementary" aria-label="@cart-summary@">
        <div class="total-header">
            <div class="total-icon-wrapper">
                <span class="material-symbols-outlined total-icon">shopping_cart</span>
            </div>
        </div>
        <div class="total-body">
            <div class="total-item">
                <div class="total-item-icon">
                    <span class="material-symbols-outlined">inventory_2</span>
                </div>
                <div class="total-item-content">
                    <div class="total-label">@total-quantity@</div>
                    <div class="total-value" id="total-adet">0</div>
                </div>
            </div>
            <div class="total-item">
                <div class="total-item-icon">
                    <span class="material-symbols-outlined">straighten</span>
                </div>
                <div class="total-item-content">
                    <div class="total-label">@total-volume@</div>
                    <div class="total-value" id="total-hacim">0 m³</div>
                </div>
            </div>
            <div class="total-item">
                <div class="total-item-icon">
                    <span class="material-symbols-outlined">scale</span>
                </div>
                <div class="total-item-content">
                    <div class="total-label">@total-weight@</div>
                    <div class="total-value" id="total-agirlik">0 kg</div>
                </div>
            </div>
        </div>
        <footer class="total-footer">
            <button type="button" class="pdf-download-btn" onclick="downloadPDF()" id="pdf-download-btn" disabled
                aria-label="@download-pdf-label@">
                <span class="material-symbols-outlined" aria-hidden="true">picture_as_pdf</span>
                <span>@pdf-download@</span>
            </button>
            <button type="button" class="clear-cart-btn" onclick="clearCart()" id="clear-cart-btn"
                aria-label="@clear-cart-label@">
                <span class="material-symbols-outlined" aria-hidden="true">delete_sweep</span>
                <span id="clear-cart-btn-text">@clear-cart@</span>
            </button>
            <button type="button" class="total-summary total-summary-btn" id="quote-open-btn" onclick="openQuoteModal()"
                aria-label="@quote-title@">
                <span class="material-symbols-outlined" aria-hidden="true">request_quote</span>
                <span>@ready@</span>
            </button>
            <div class="total-warning">
                @volume-warning@
            </div>
            </div>
    </aside>

</main>


"<div class="volume-edit-popup is-hidden" id="quote-popup" style="display: none;">
    <div class="popup-overlay" onclick="closeQuoteModal()"></div>
    <div class="popup-content quote-popup-content">
        <div class="popup-header">
            <h3>@quote-title@</h3>
            <button class="popup-close" onclick="closeQuoteModal()" style="cursor: pointer;">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div class="popup-body">
            <div class="quote-summary quote-summary-block" id="quote-cart-summary" aria-live="polite"></div>
            <form id="quote-form" class="quote-form quote-form-inline" onsubmit="return sendQuoteFromGo1ilz(event);">
                <div class="quote-form-grid">
                    <div class="quote-form-group">
                        <label for="quote-name">@quote-name@</label>
                        <input type="text" id="quote-name" name="name" required class="quote-input" autocomplete="name" />
                    </div>
                    <div class="quote-form-group">
                        <label for="quote-email">@quote-email@</label>
                        <input type="email" id="quote-email" name="email" required class="quote-input" autocomplete="email" />
                    </div>
                    <div class="quote-form-group">
                        <label for="quote-phone">@quote-phone@</label>
                        <input type="tel" id="quote-phone" name="phone" class="quote-input" autocomplete="tel" />
                    </div>
                    <div class="quote-form-group">
                        <label for="quote-from">@quote-from@</label>
                        <input type="text" id="quote-from" name="fromAddress" class="quote-input" />
                    </div>
                    <div class="quote-form-group">
                        <label for="quote-to">@quote-to@</label>
                        <input type="text" id="quote-to" name="toAddress" class="quote-input" />
                    </div>
                </div>
                <div class="quote-form-group quote-form-message">
                    <label for="quote-message">@quote-message@</label>
                    <textarea id="quote-message" name="message" class="quote-input quote-textarea" rows="3"></textarea>
                </div>
                <div id="quote-result" class="quote-result" aria-live="polite"></div>
                <div class="quote-form-actions">
                    <button type="submit" class="quote-submit-btn" id="quote-send-btn">@quote-send-btn@</button>
                </div>
            </form>
        </div>
    </div>
</div>


<div class="volume-edit-popup" id="volume-edit-popup" style="display: none;">
    <div class="popup-overlay" onclick="closeVolumeEditPopup()"></div>
    <div class="popup-content">
        <div class="popup-header">
            <h3>@edit-dimensions-weight@</h3>
            <button class="popup-close" onclick="closeVolumeEditPopup()">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>
        <div class="popup-body">
            <div class="popup-product-info">
                <div class="popup-product-name" id="popup-product-name"></div>
                <div class="popup-product-code" id="popup-product-code"></div>
            </div>

            <div class="popup-section">
                <h4 class="popup-section-title">@estimated-dimensions@</h4>
                <div class="popup-dimensions-grid">
                    <div class="popup-form-group">
                        <label for="popup-width-input">@width-cm@</label>
                        <input type="number" id="popup-width-input" step="0.1" min="0" class="popup-input"
                            placeholder="00" inputmode="decimal" />
                    </div>
                    <div class="popup-form-group">
                        <label for="popup-depth-input">@depth-cm@</label>
                        <input type="number" id="popup-depth-input" step="0.1" min="0" class="popup-input"
                            placeholder="00" inputmode="decimal" />
                    </div>
                    <div class="popup-form-group">
                        <label for="popup-height-input">@height-cm@</label>
                        <input type="number" id="popup-height-input" step="0.1" min="0" class="popup-input"
                            placeholder="00" inputmode="decimal" />
                    </div>
                </div>
            </div>

            <div class="popup-section">
                <h4 class="popup-section-title">@estimated-weight@</h4>
                <div class="popup-form-group">
                    <label for="popup-weight-input">@weight-kg@</label>
                    <input type="number" id="popup-weight-input" step="0.1" min="0" class="popup-input" placeholder="00"
                        inputmode="decimal" />
                    <div class="popup-hint">@weight-hint@
                    </div>
                </div>
            </div>

            <div class="popup-calculated-info">
                <div class="popup-calculated-item">
                    <span class="popup-calculated-label">@calculated-volume@</span>
                    <span class="popup-calculated-value" id="popup-calculated-volume">0.00 m³</span>
                </div>
                <div class="popup-calculated-item">
                    <span class="popup-calculated-label">@original-volume@</span>
                    <span class="popup-calculated-value" id="popup-original-volume">0.00 m³</span>
                </div>
            </div>

            <div class="popup-actions">
                <button class="popup-btn popup-btn-cancel" onclick="closeVolumeEditPopup()">
                    @menu-close@
                </button>
                <button class="popup-btn popup-btn-save" onclick="saveVolumeEdit()">@save@</button>
            </div>
        </div>
    </div>
</div>

<script>


    var productCounters = {};

    var productData = {};

    var editedVolumes = {};

    var editedDimensions = {};

    var allProducts = [];

    var currentCategory = null;

    var editingProductId = null;

    var GO1ILZ_API_BASE = 'https://api.hanbroscargo.workers.dev';
    var STORAGE_KEY_GO1ILZ = 'hanbros_uk_go1ilz_akilli_hesaplama';


    function saveToLocalStorage() {
        try {
            var payload = {
                productCounters: productCounters,
                editedVolumes: editedVolumes,
                editedDimensions: editedDimensions,
                savedAt: new Date().toISOString()
            };
            localStorage.setItem(STORAGE_KEY_GO1ILZ, JSON.stringify(payload));
        } catch (e) {
            console.warn('localStorage kaydedilemedi:', e);
        }
    }

    function restoreFromLocalStorage() {
        try {
            var raw = localStorage.getItem(STORAGE_KEY_GO1ILZ);
            if (!raw) return null;
            var data = JSON.parse(raw);
            if (!data || typeof data.productCounters !== 'object') return null;
            return data;
        } catch (e) {
            console.warn('localStorage could not be read:', e);
            return null;
        }
    }

    function applyRestoredData(data) {
        if (!data) return;
        var id;
        if (data.productCounters && typeof data.productCounters === 'object') {
            for (id in data.productCounters) {
                if (data.productCounters.hasOwnProperty(id) && productData[id] != null && data.productCounters[id] > 0) {
                    productCounters[id] = data.productCounters[id];
                }
            }
        }
        if (data.editedVolumes && typeof data.editedVolumes === 'object') {
            for (id in data.editedVolumes) {
                if (data.editedVolumes.hasOwnProperty(id) && productData[id] != null) {
                    editedVolumes[id] = parseFloat(data.editedVolumes[id]);
                }
            }
        }
        if (data.editedDimensions && typeof data.editedDimensions === 'object') {
            for (id in data.editedDimensions) {
                if (data.editedDimensions.hasOwnProperty(id) && productData[id] != null && data.editedDimensions[id]) {
                    editedDimensions[id] = data.editedDimensions[id];
                }
            }
        }
    }


    function updateTotalCounter() {
        var totalAdet = 0;
        var totalHacim = 0;
        var totalAgirlik = 0;
        var id, count, product, volume, edited, weight;

        for (id in productCounters) {
            if (!productCounters.hasOwnProperty(id)) continue;
            count = productCounters[id];
            if (count <= 0) continue;
            totalAdet += count;
            product = productData[id];
            volume = editedVolumes[id] !== undefined ? editedVolumes[id] : (product && product.Volume ? product.Volume : 0);
            if (volume > 0) totalHacim += count * volume;
            edited = editedDimensions[id];
            weight = (edited && edited.weight) ? edited.weight : (product && product.Weight ? parseFloat(product.Weight) : 0);
            if (weight > 0) totalAgirlik += count * weight;
        }

        var elAdet = document.getElementById('total-adet');
        var elHacim = document.getElementById('total-hacim');
        var elAgirlik = document.getElementById('total-agirlik');
        var pdfBtn = document.getElementById('pdf-download-btn');

        if (elAdet) elAdet.textContent = totalAdet;
        if (elHacim) elHacim.textContent = totalHacim.toFixed(2) + ' m³';
        if (elAgirlik) elAgirlik.textContent = totalAgirlik.toFixed(2) + ' kg';
        if (pdfBtn) pdfBtn.disabled = totalAdet === 0;

        updateCategoryBadges();
        saveToLocalStorage();
    }


    function padZero(n) {
        return n < 10 ? '0' + n : '' + n;
    }

    function buildPDFContent(doc, addedProducts, totalAdet, totalHacim, totalAgirlik, lang, now, logoBase64, logoHeight, logoImgHeight) {
        var locale = lang === 'en' ? 'en-US' : 'en-GB';
        var dateStr = now.toLocaleDateString(locale, { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' });

        var fontName = doc._pdfTrFont ? 'RobotoTR' : 'helvetica';

        doc.setFont(fontName, 'bold');
        doc.setFontSize(18);
        doc.setTextColor(0, 154, 150);
        doc.text(getTranslation('product-list'), 105, logoHeight + 10, { align: 'center' });

        doc.setFont(fontName, 'normal');
        doc.setFontSize(10);
        doc.setTextColor(100, 100, 100);
        doc.text(getTranslation('date') + ' ' + dateStr, 105, logoHeight + 18, { align: 'center' });

        var tableData = [];
        for (var i = 0; i < addedProducts.length; i++) {
            var p = addedProducts[i];
            tableData.push([
                (i + 1).toString(),
                p.name,
                p.category,
                p.count.toString(),
                p.totalVolume > 0 ? p.totalVolume.toFixed(2) : '-',
                p.totalWeight > 0 ? p.totalWeight.toFixed(2) : '-'
            ]);
        }

        var totalsRow = [
            getTranslation('total'),
            '',
            '',
            totalAdet.toString(),
            totalHacim > 0 ? totalHacim.toFixed(2) : '-',
            totalAgirlik > 0 ? totalAgirlik.toFixed(2) : '-'
        ];

        tableData.push(totalsRow);

        doc.autoTable({
            startY: logoHeight + 25,
            head: [
                [getTranslation('#'), getTranslation('product-name'), getTranslation('category'), getTranslation('quantity'), getTranslation('volume'), getTranslation('weight')]
            ],
            body: tableData,
            theme: 'grid',
            styles: {
                font: fontName,
                fontSize: 8
            },
            headStyles: {

    function downloadPDF() {
        if (typeof window.jspdf === 'undefined') {
            alert(getTranslation('pdf-loading'));
            return;
        }

        var jsPDF = window.jspdf.jsPDF;
        var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
        doc.setFont('helvetica');

        var addedProducts = [];
        var id, count, product, edited, volume, weight;
        for (id in productCounters) {
            if (!productCounters.hasOwnProperty(id)) continue;
            count = productCounters[id];
            if (count <= 0) continue;
            product = productData[id];
            if (!product) continue;
            edited = editedDimensions[id];
            volume = editedVolumes[id] !== undefined ? editedVolumes[id] : (product.Volume || 0);
            weight = (edited && edited.weight) ? edited.weight : (product.Weight ? parseFloat(product.Weight) : 0);
            addedProducts.push({
                name: getTextByLang(product.Name) || '-',
                code: product.Code || '-',
                category: getTextByLang(product.ProductGroup) || '-',
                count: count,
                volume: volume,
                weight: weight,
                totalVolume: count * volume,
                totalWeight: count * weight
            });
        }

        if (addedProducts.length === 0) {
            alert(getTranslation('empty-cart'));
            return;
        }

        var totalAdet = 0, totalHacim = 0, totalAgirlik = 0;
        for (var i = 0; i < addedProducts.length; i++) {
            totalAdet += addedProducts[i].count;
            totalHacim += addedProducts[i].totalVolume;
            totalAgirlik += addedProducts[i].totalWeight;
        }

        var lang = getCurrentLang();
        var now = new Date();

        function loadTurkishFont(pdfDoc) {
            return fetch('https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/fonts/Roboto/Roboto-Regular.ttf')
                .then(function (res) {
                    if (!res.ok) throw new Error('font yok');
                    return res.arrayBuffer();
                })
                .then(function (buf) {
                    var binary = '';
                    var bytes = new Uint8Array(buf);
                    for (var i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
                    var base64 = btoa(binary);
                    pdfDoc.addFileToVFS('Roboto-Regular.ttf', base64);
                    pdfDoc.addFont('Roboto-Regular.ttf', 'RobotoTR', 'normal');
                    pdfDoc.addFont('Roboto-Regular.ttf', 'RobotoTR', 'bold');
                    pdfDoc._pdfTrFont = true;
                })
                .catch(function () {
                    pdfDoc._pdfTrFont = false;
                });
        }

        loadTurkishFont(doc).then(function () {
        return fetch('/img/logo.png')
            .then(function (res) {
                if (!res.ok) throw new Error('logo yok');
                return res.blob();
            })
            .then(function (blob) {
                return new Promise(function (resolve) {
                    var reader = new FileReader();
                    reader.onloadend = function () { resolve(reader.result); };
                    reader.readAsDataURL(blob);
                });
            })
            .catch(function () { return null; })
            .then(function (logoBase64) {
                var logoImgHeight = 15;
                var logoHeight = 0;
                if (logoBase64) {
                    doc.addImage(logoBase64, 'PNG', 10, 10, 50, logoImgHeight);
                    logoHeight = 20;
                }
                buildPDFContent(doc, addedProducts, totalAdet, totalHacim, totalAgirlik, lang, now, logoBase64, logoHeight, logoImgHeight);
                var fileName = 'urun-listesi-' + now.getFullYear() + padZero(now.getMonth() + 1) + padZero(now.getDate()) + '-' + padZero(now.getHours()) + padZero(now.getMinutes()) + '.pdf';
                doc.save(fileName);
            });
        });
    }


    function getCurrentLang() {
        var path = window.location.pathname;
        if (path.indexOf('/tr/') !== -1) return 'tr';
        if (path.indexOf('/en/') !== -1) return 'en';
        return 'tr';
    }

    function getTextByLang(text) {
        if (!text || text.indexOf('/') === -1) return text;
        var parts = text.split('/');
        for (var i = 0; i < parts.length; i++) parts[i] = parts[i].trim();
        return getCurrentLang() === 'tr' ? parts[0] : (parts[1] || parts[0]);
    }


    var translationsCache = null;

    function getTranslation(key) {
        var lang = getCurrentLang();
        if (typeof translate !== 'undefined' && translate[key] && translate[key][lang]) {
            return translate[key][lang];
        }
        if (translationsCache && translationsCache[key] && translationsCache[key][lang]) {
            return translationsCache[key][lang];
        }
        return key;
    }

    if (typeof translate === 'undefined' || Object.keys(translate).length === 0) {
        fetch('/module/go1ilz/lang.json', { method: 'GET', headers: { 'Accept': 'application/json' }, cache: 'no-cache' })
            .then(function (response) {
                if (!response.ok) throw new Error('HTTP ' + response.status);
                return response.json();
            })
            .then(function (data) {
                translationsCache = data;
                applyTranslationsToModule();
                updateClearCartButtonText();
            })
            .catch(function (error) {
                console.warn('Lang.json could not be loaded:', error);
            });
    } else {
        setTimeout(applyTranslationsToModule, 0);
    }

    function applyTranslationsToModule() {
        var root = document.querySelector('.modulex-wrapper') || document.body;
        if (!root || !root.innerHTML) return;
        var html = root.innerHTML;
        var changed = html.replace(/@([a-zA-Z0-9_-]+)@/g, function (match, key) {
            var val = getTranslation(key);
            return val !== key ? val : match;
        });
        if (changed !== html) root.innerHTML = changed;
    }

    function calculateVolume(width, depth, height) {
        if (!width || !depth || !height) return 0;
        return (parseFloat(width) * parseFloat(depth) * parseFloat(height)) / 1000000;
    }

    function updateCalculatedVolume() {
        var widthInput = document.getElementById('popup-width-input');
        var depthInput = document.getElementById('popup-depth-input');
        var heightInput = document.getElementById('popup-height-input');
        var calculatedVolume = document.getElementById('popup-calculated-volume');
        if (!widthInput || !depthInput || !heightInput || !calculatedVolume) return;
        var volume = calculateVolume(widthInput.value, depthInput.value, heightInput.value);
        calculatedVolume.textContent = volume > 0 ? volume.toFixed(2) + ' m³' : '0.00 m³';
    }


    function openVolumeEditPopup(productId) {
        var product = productData[productId];
        if (!product) return;

        editingProductId = productId;
        var popup = document.getElementById('volume-edit-popup');
        if (!popup) return;

        var productName = document.getElementById('popup-product-name');
        var productCode = document.getElementById('popup-product-code');
        var originalVolume = document.getElementById('popup-original-volume');
        var widthInput = document.getElementById('popup-width-input');
        var depthInput = document.getElementById('popup-depth-input');
        var heightInput = document.getElementById('popup-height-input');
        var weightInput = document.getElementById('popup-weight-input');

        if (productName) productName.textContent = getTextByLang(product.Name) || '-';
        if (productCode) productCode.textContent = getTranslation('code') + ' ' + (product.Code || '-');
        if (originalVolume) originalVolume.textContent = parseFloat(product.Volume || 0).toFixed(2) + ' m³';

        var edited = editedDimensions[productId];
        if (widthInput) widthInput.value = (edited && edited.width) ? edited.width : '';
        if (depthInput) depthInput.value = (edited && edited.depth) ? edited.depth : '';
        if (heightInput) heightInput.value = (edited && edited.height) ? edited.height : '';
        if (weightInput) weightInput.value = (edited && edited.weight) ? edited.weight : (product.Weight || '');

        if (widthInput && !widthInput.dataset.listenerAdded) {
            widthInput.addEventListener('input', updateCalculatedVolume);
            widthInput.dataset.listenerAdded = 'true';
        }
        if (depthInput && !depthInput.dataset.listenerAdded) {
            depthInput.addEventListener('input', updateCalculatedVolume);
            depthInput.dataset.listenerAdded = 'true';
        }
        if (heightInput && !heightInput.dataset.listenerAdded) {
            heightInput.addEventListener('input', updateCalculatedVolume);
            heightInput.dataset.listenerAdded = 'true';
        }

        updateCalculatedVolume();
        document.body.style.overflow = 'hidden';
        document.body.style.position = 'fixed';
        document.body.style.width = '100%';
        popup.style.display = 'flex';

        setTimeout(function () {
            if (widthInput) {
                widthInput.focus();
                var popupBody = document.querySelector('.popup-body');
                if (popupBody) popupBody.scrollTop = 0;
            }
        }, 100);

    function saveVolumeEdit() {
        if (!editingProductId) return;

        var widthInput = document.getElementById('popup-width-input');
        var depthInput = document.getElementById('popup-depth-input');
        var heightInput = document.getElementById('popup-height-input');
        var weightInput = document.getElementById('popup-weight-input');
        if (!widthInput || !depthInput || !heightInput || !weightInput) return;

        var width = parseFloat(widthInput.value);
        var depth = parseFloat(depthInput.value);
        var height = parseFloat(heightInput.value);
        var weight = parseFloat(weightInput.value);

        if (!productData[editingProductId]) return;

        var hasDimensions = width > 0 && depth > 0 && height > 0;

        if (hasDimensions) {
            editedDimensions[editingProductId] = {
                width: width,
                depth: depth,
                height: height,
                weight: weight > 0 ? weight : null
            };
            editedVolumes[editingProductId] = calculateVolume(width, depth, height);
        } else if (weight > 0) {
            if (!editedDimensions[editingProductId]) editedDimensions[editingProductId] = {};
            editedDimensions[editingProductId].weight = weight;
        } else {
            delete editedDimensions[editingProductId];
            delete editedVolumes[editingProductId];
        }

        if (!productCounters[editingProductId] || productCounters[editingProductId] === 0) {
            productCounters[editingProductId] = 1;
            updateProductCounterDisplay(editingProductId, 1);
            var productCards = document.querySelectorAll('.product-card');
            for (var i = 0; i < productCards.length; i++) {
                var cardId = productCards[i].dataset.productId;
                if (cardId && (cardId === editingProductId.toString() || parseInt(cardId) === editingProductId)) {
                    productCards[i].classList.add('active');
                }
            }
        }

        updateTotalCounter();
        updateProductVolumeDisplay(editingProductId);
        closeVolumeEditPopup();
        saveToLocalStorage();
    }


    function updateDecreaseButton(button, count) {

            button.classList.add('delete-btn');

    function updateProductCounterDisplay(productId, count) {
        var productCards = document.querySelectorAll('.product-card');
        for (var i = 0; i < productCards.length; i++) {
            var card = productCards[i];
            var cardProductId = card.dataset.productId;
            if (!cardProductId) continue;
            if (cardProductId !== productId.toString() && parseInt(cardProductId) !== productId) continue;

            var counter = card.querySelector('.product-counter');
            if (!counter) continue;

            var countValue = card.querySelector('.counter-value');
            var decreaseBtn = counter.querySelector('.counter-btn:first-of-type');
            var editBtn = counter.querySelector('.edit-btn');

            if (countValue) {
                countValue.textContent = count;
                countValue.style.display = count > 0 ? 'block' : 'none';
            }
            if (decreaseBtn) {
                decreaseBtn.style.display = count > 0 ? 'flex' : 'none';
                if (count > 0) updateDecreaseButton(decreaseBtn, count);
            }
            if (editBtn) {
                editBtn.style.display = count > 0 ? 'flex' : 'none';
            }
            if (count > 0) {
                card.classList.add('active');
            } else {
                card.classList.remove('active');
            }
        }

    function updateProductVolumeDisplay(productId) {
        var product = productData[productId];
        if (!product) return;

        var productCards = document.querySelectorAll('.product-card');
        for (var i = 0; i < productCards.length; i++) {
            var card = productCards[i];
            var cardProductId = card.dataset.productId;
            if (!cardProductId) continue;
            if (cardProductId !== productId.toString() && parseInt(cardProductId) !== productId) continue;

            var categoryInfo = card.querySelector('.product-category');
            if (!categoryInfo) continue;

            var volume = editedVolumes[productId] !== undefined ? editedVolumes[productId] : (product.Volume || 0);
            var categoryText = getTextByLang(product.ProductGroup) || '-';
            if (parseFloat(volume) > 0) {
                categoryInfo.innerHTML = categoryText + ' <span class="product-volume-inline">• ' + parseFloat(volume).toFixed(2) + ' m³</span>';
            } else {
                categoryInfo.textContent = categoryText;
            }
        }
    }


    function clearCart() {
        var id;
        for (id in productCounters) { if (productCounters.hasOwnProperty(id)) delete productCounters[id]; }
        for (id in editedVolumes) { if (editedVolumes.hasOwnProperty(id)) delete editedVolumes[id]; }
        for (id in editedDimensions) { if (editedDimensions.hasOwnProperty(id)) delete editedDimensions[id]; }
        try { localStorage.removeItem(STORAGE_KEY_GO1ILZ); } catch (e) { console.warn('localStorage temizlenemedi:', e); }

        updateTotalCounter();
        var cards = document.querySelectorAll('.product-card');
        for (var i = 0; i < cards.length; i++) {
            if (cards[i].dataset.productId) updateProductCounterDisplay(cards[i].dataset.productId, 0);
            cards[i].classList.remove('active');
        }
        updateCategoryBadges();

    function clearSearch() {
        var searchInput = document.getElementById('search-input');
        var searchClear = document.getElementById('search-clear');
        var suggestionsContainer = document.getElementById('search-suggestions');

        if (searchInput) { searchInput.value = ''; performSearch(''); }
        if (searchClear) searchClear.style.display = 'none';
        if (suggestionsContainer) suggestionsContainer.style.display = 'none';

        if (currentCategory) {
            renderProducts(currentCategory, null);
        } else {
            var firstTab = document.querySelector('.category-tab');
            if (firstTab && firstTab.dataset.category) {
                var tabs = document.querySelectorAll('.category-tab');
                for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
                firstTab.classList.add('active');
                renderProducts(firstTab.dataset.category, null);
            }
        }
    }


    function updateCategoryBadges() {
        var categoryTabs = document.querySelectorAll('.category-tab');
        for (var i = 0; i < categoryTabs.length; i++) {
            var tab = categoryTabs[i];
            var category = tab.dataset.category;
            var categoryVolume = tab.querySelector('.category-volume');
            var categoryCount = tab.querySelector('.category-count');
            if (!categoryVolume || !categoryCount) continue;

            var categoryAddedCount = 0;
            var categoryTotalVolume = 0;
            var id, count, product, volume;
            for (id in productCounters) {
                if (!productCounters.hasOwnProperty(id)) continue;
                count = productCounters[id];
                if (count <= 0) continue;
                product = productData[id];
                if (!product || product.ProductGroup !== category) continue;
                categoryAddedCount += count;
                volume = editedVolumes[id] !== undefined ? editedVolumes[id] : (product.Volume || 0);
                if (volume > 0) categoryTotalVolume += count * volume;
            }

            if (categoryAddedCount > 0) {
                tab.classList.add('has-products');
                categoryVolume.textContent = categoryTotalVolume.toFixed(2) + ' m³';
                categoryVolume.style.display = 'inline';
                categoryCount.textContent = categoryAddedCount + ' ' + getTranslation('piece');
                categoryCount.style.display = 'inline';
            } else {
                tab.classList.remove('has-products');
                categoryVolume.style.display = 'none';
                categoryCount.style.display = 'none';
            }
        }
    }


    function showSuggestions(searchTerm) {
        var suggestionsContainer = document.getElementById('search-suggestions');
        if (!suggestionsContainer) return;

        var searchLower = searchTerm.toLowerCase().trim();
        if (!searchLower) {
            suggestionsContainer.style.display = 'none';
            return;
        }

        var filteredProducts = [];
        for (var i = 0; i < allProducts.length; i++) {
            var product = allProducts[i];
            if (!product.IsActive) continue;
            var name = getTextByLang(product.Name || '').toLowerCase();
            var code = (product.Code || '').toLowerCase();
            if (name.indexOf(searchLower) !== -1 || code.indexOf(searchLower) !== -1) {
                filteredProducts.push(product);
            }
            if (filteredProducts.length >= 10) break;
        }

        if (filteredProducts.length === 0) {
            suggestionsContainer.innerHTML = '<div class="suggestion-empty">' + getTranslation('no-results') + '</div>';
            suggestionsContainer.style.display = 'block';
            return;
        }

        suggestionsContainer.innerHTML = '';
        for (var j = 0; j < filteredProducts.length; j++) {
            (function (product) {
                var item = document.createElement('div');
                item.className = 'suggestion-item';
                item.innerHTML = '<div class="suggestion-code">' + (product.Code || '-') + '</div>' +
                    '<div class="suggestion-name">' + (getTextByLang(product.Name) || '-') + '</div>' +
                    '<div class="suggestion-category">' + (getTextByLang(product.ProductGroup) || '-') + '</div>';
                item.onclick = function () {
                    var searchInput = document.getElementById('search-input');
                    if (searchInput) {
                        searchInput.value = getTextByLang(product.Name) || product.Code || '';
                        performSearch(searchInput.value);
                        suggestionsContainer.style.display = 'none';
                    }
                };
                suggestionsContainer.appendChild(item);
            })(filteredProducts[j]);
        }
        suggestionsContainer.style.display = 'block';
    }

    function performSearch(searchTerm) {
        var searchLower = searchTerm.toLowerCase().trim();
        var searchClear = document.getElementById('search-clear');
        var suggestionsContainer = document.getElementById('search-suggestions');

        if (searchClear) searchClear.style.display = searchLower ? 'block' : 'none';
        if (suggestionsContainer) suggestionsContainer.style.display = 'none';

        if (!searchLower) {
            if (currentCategory) {
                renderProducts(currentCategory, null);
            } else {
                var firstTab = document.querySelector('.category-tab');
                if (firstTab && firstTab.dataset.category) {
                    var tabs = document.querySelectorAll('.category-tab');
                    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
                    firstTab.classList.add('active');
                    renderProducts(firstTab.dataset.category, null);
                }
            }
            return;
        }

        var filteredProducts = [];
        for (var j = 0; j < allProducts.length; j++) {
            var product = allProducts[j];
            if (!product.IsActive) continue;
            var name = getTextByLang(product.Name || '').toLowerCase();
            var code = (product.Code || '').toLowerCase();
            if (name.indexOf(searchLower) !== -1 || code.indexOf(searchLower) !== -1) {
                filteredProducts.push(product);
            }
        }
        renderSearchResults(filteredProducts);
    }


    function createProductCard(product) {

        var count = productCounters[productId] || 0;

        var card = document.createElement('div');
        card.className = 'product-card' + (count > 0 ? ' active' : '');
        card.dataset.productId = productId;

        var infoWrapper = document.createElement('div');
        infoWrapper.className = 'product-info-wrapper';

        var infoContent = document.createElement('div');
        infoContent.className = 'product-info-content';

        var nameEl = document.createElement('div');
        nameEl.className = 'product-name';
        nameEl.textContent = getTextByLang(product.Name) || '-';

        var categoryInfo = document.createElement('div');
        categoryInfo.className = 'product-category';
        var categoryText = getTextByLang(product.ProductGroup) || '-';
        var volume = editedVolumes[productId] !== undefined ? editedVolumes[productId] : (product.Volume || 0);
        if (parseFloat(volume) > 0) {
            categoryInfo.innerHTML = categoryText + ' <span class="product-volume-inline">• ' + parseFloat(volume).toFixed(2) + ' m³</span>';
        } else {
            categoryInfo.textContent = categoryText;
        }

        infoContent.appendChild(nameEl);
        infoContent.appendChild(categoryInfo);

        var details = document.createElement('div');
        details.className = 'product-details';

        var infoRow = document.createElement('div');
        infoRow.className = 'product-info-row';
        infoRow.appendChild(infoContent);
        infoRow.appendChild(details);

        var edited = editedDimensions[productId];
        var weight = (edited && edited.weight) ? edited.weight : product.Weight;
        if (weight) {
            var weightItem = document.createElement('div');
            weightItem.className = 'product-detail-item';
            weightItem.innerHTML = '<span class="product-detail-label">Weight:</span>' +
                '<span class="product-detail-value">' + weight + ' kg</span>';
            details.appendChild(weightItem);
        }

        infoWrapper.appendChild(infoRow);

        var counter = document.createElement('div');
        counter.className = 'product-counter';

        var decreaseBtn = document.createElement('button');
        decreaseBtn.className = 'counter-btn';
        decreaseBtn.style.display = count > 0 ? 'flex' : 'none';
        if (count > 0) updateDecreaseButton(decreaseBtn, count);

        var countValue = document.createElement('span');
        countValue.className = 'counter-value';
        countValue.textContent = count;
        countValue.style.display = count > 0 ? 'block' : 'none';

        var increaseBtn = document.createElement('button');
        increaseBtn.className = 'counter-btn';
        increaseBtn.innerHTML = '+';

        var editBtn = document.createElement('button');
        editBtn.className = 'edit-btn';
        editBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size: 18px;">edit</span>';
        editBtn.title = 'Edit volume';
        editBtn.style.display = count > 0 ? 'flex' : 'none';
        editBtn.onclick = function () { openVolumeEditPopup(productId); };

        increaseBtn.onclick = function () {
            var current = (productCounters[productId] || 0) + 1;
            productCounters[productId] = current;
            countValue.textContent = current;
            countValue.style.display = 'block';
            decreaseBtn.style.display = 'flex';
            editBtn.style.display = 'flex';
            updateDecreaseButton(decreaseBtn, current);
            card.classList.add('active');
            updateTotalCounter();
        };

        decreaseBtn.onclick = function () {
            var current = productCounters[productId] || 0;
            if (current <= 0) return;
            current--;
            productCounters[productId] = current;
            countValue.textContent = current;
            if (current === 0) {
                decreaseBtn.style.display = 'none';
                countValue.style.display = 'none';
                editBtn.style.display = 'none';
                card.classList.remove('active');
            } else {
                updateDecreaseButton(decreaseBtn, current);
            }
            updateTotalCounter();
        };

        counter.appendChild(decreaseBtn);
        counter.appendChild(countValue);
        counter.appendChild(increaseBtn);
        counter.appendChild(editBtn);

        card.appendChild(infoWrapper);
        card.appendChild(counter);
        return card;
    }


    function renderProducts(category, searchTerm) {
        currentCategory = category;
        var categoriesContent = document.getElementById('categories-content');
        if (!categoriesContent) return;

        var filteredProducts = [];
        for (var i = 0; i < allProducts.length; i++) {
            var p = allProducts[i];
            if (p.ProductGroup !== category || !p.IsActive) continue;
            if (searchTerm) {
                var sl = searchTerm.toLowerCase();
                var pName = getTextByLang(p.Name || '').toLowerCase();
                var pCode = (p.Code || '').toLowerCase();
                if (pName.indexOf(sl) === -1 && pCode.indexOf(sl) === -1) continue;
            }
            filteredProducts.push(p);
        }

        if (filteredProducts.length === 0) {
            categoriesContent.innerHTML = '<div class="no-products">' + getTranslation('no-products') + '</div>';
            return;
        }

        var grid = document.createElement('div');
        grid.className = 'products-grid';
        for (var j = 0; j < filteredProducts.length; j++) {
            grid.appendChild(createProductCard(filteredProducts[j]));
        }
        categoriesContent.innerHTML = '';
        categoriesContent.appendChild(grid);
    }

    function renderSearchResults(products) {
        var categoriesContent = document.getElementById('categories-content');
        if (!categoriesContent) return;

        if (products.length === 0) {
            categoriesContent.innerHTML = '<div class="no-products">' + getTranslation('no-results') + '</div>';
            return;
        }

        var grid = document.createElement('div');
        grid.className = 'products-grid';
        for (var i = 0; i < products.length; i++) {
            grid.appendChild(createProductCard(products[i]));
        }
        categoriesContent.innerHTML = '';
        categoriesContent.appendChild(grid);
    }

    
    function getCategoriesFilteredByHash(allCategories) {
        var hash = (location.hash || '').replace(/^#/, '').toLowerCase().trim();
        if (!hash) {
            return allCategories;
        }

        var groupKey = function (name) {
            var s = String(name || '').trim();
            var parts = s.split(/\s*\/\s*/);
            if (parts.length >= 2) {
                return parts[parts.length - 1].trim().toUpperCase();
            }
            return s.toUpperCase();
        };

        if (hash === 'ticari') {
            return allCategories.filter(function (c) {
                var k = groupKey(c);
                return k === 'COMMERCIAL' || k === 'VARIOUS';
            });
        }
        if (hash === 'arac' || hash === 'vehicle') {
            return allCategories.filter(function (c) {
                return groupKey(c) === 'VEHICLE';
            });
        }
        if (hash === 'zati' || hash === 'kargo') {
            return allCategories.filter(function (c) {
                var k = groupKey(c);
                return k !== 'VEHICLE' && k !== 'COMMERCIAL';
            });
        }
        if (hash === 'mobilya') {
            var fuAllowed = ['BEDROOM', 'LOUNGE', 'YOUTH ROOM', 'BALCONY-GARDEN', 'HALL', 'DRAWING ROOM', 'DINING ROOM', 'KITCHEN', 'BATH', 'VARIOUS'];
            return allCategories.filter(function (c) {
                return fuAllowed.indexOf(groupKey(c)) !== -1;
            });
        }
        return allCategories;
    }


    function loadProducts(retryCount) {
        retryCount = retryCount || 0;
        var maxRetries = 3;
        var categoriesContent = document.getElementById('categories-content');
        if (categoriesContent) {
            categoriesContent.innerHTML = '<div class="no-products" style="text-align:center;padding:40px;">' + (getTranslation('loading') || 'Loading') + '...</div>';
        }

        var abortController = new AbortController();
        var timeoutId = setTimeout(function () {
            abortController.abort();
            console.error('API timeout — no response within 20 seconds');
        }, 20000);

        fetch('https://api.hanbroscargo.workers.dev/groups', {
            method: 'GET',
            headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
            mode: 'cors',
            cache: 'no-cache',
            signal: abortController.signal
        })
        .then(function (response) {
            clearTimeout(timeoutId);
            if (!response.ok) throw new Error('HTTP ' + response.status + ': ' + response.statusText);
            return response.json();
        })
        .then(function (data) {
            var products = data;
            if (!Array.isArray(products) && data) {
                if (Array.isArray(data.Data)) products = data.Data;
                else if (Array.isArray(data.Items)) products = data.Items;
                else if (data.data && Array.isArray(data.data)) products = data.data;
                else if (data.Data && data.Data.Items && Array.isArray(data.Data.Items)) products = data.Data.Items;
                else products = [];
            }
            if (!Array.isArray(products)) products = [];

            allProducts = products;
            for (var i = 0; i < products.length; i++) {
                productData[products[i].ID] = products[i];
            }

            var saved = restoreFromLocalStorage();
            if (saved) applyRestoredData(saved);

            var categorySet = {};
            var allCategories = [];
            for (var k = 0; k < products.length; k++) {
                var group = products[k].ProductGroup;
                if (group && !categorySet[group]) {
                    categorySet[group] = true;
                    allCategories.push(group);
                }
            }

            var categories = getCategoriesFilteredByHash(allCategories);
            if (!categories.length) categories = allCategories;

            var categoriesList = document.getElementById('categories-list');
            var catContent = document.getElementById('categories-content');
            if (!categoriesList || !catContent) return;

            categoriesList.innerHTML = '';

            for (var j = 0; j < categories.length; j++) {
                (function (category, index) {
                    var tab = document.createElement('div');
                    tab.className = 'category-tab' + (index === 0 ? ' active' : '');
                    tab.dataset.category = category;

                    var topRow = document.createElement('div');
                    topRow.className = 'category-tab-row';
                    var categoryName = document.createElement('span');
                    categoryName.textContent = getTextByLang(category);
                    topRow.appendChild(categoryName);

                    var bottomRow = document.createElement('div');
                    bottomRow.className = 'category-tab-bottom';

                    var categoryVolume = document.createElement('span');
                    categoryVolume.className = 'category-volume';
                    categoryVolume.style.display = 'none';
                    categoryVolume.dataset.category = category;

                    var categoryCount = document.createElement('span');
                    categoryCount.className = 'category-count';
                    categoryCount.style.display = 'none';

                    bottomRow.appendChild(categoryVolume);
                    bottomRow.appendChild(categoryCount);
                    tab.appendChild(topRow);
                    tab.appendChild(bottomRow);

                    tab.onclick = function () {
                        var allTabs = document.querySelectorAll('.category-tab');
                        for (var t = 0; t < allTabs.length; t++) allTabs[t].classList.remove('active');
                        tab.classList.add('active');
                        var searchInput = document.getElementById('search-input');
                        if (searchInput) searchInput.value = '';
                        renderProducts(tab.dataset.category);
                    };
                    categoriesList.appendChild(tab);
                })(categories[j], j);
            }

            var searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('input', function (e) {
                    showSuggestions(e.target.value);
                    performSearch(e.target.value);
                });
                searchInput.addEventListener('keypress', function (e) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        var suggestionsContainer = document.getElementById('search-suggestions');
                        if (suggestionsContainer) suggestionsContainer.style.display = 'none';
                    }
                });
                document.addEventListener('click', function (e) {
                    var searchWrapper = document.querySelector('.search-wrapper');
                    var suggestionsContainer = document.getElementById('search-suggestions');
                    if (searchWrapper && suggestionsContainer && !searchWrapper.contains(e.target)) {
                        suggestionsContainer.style.display = 'none';
                    }
                });
            }

            renderProducts(categories[0]);
            updateCategoryBadges();
            updateTotalCounter();
        })
        .catch(function (error) {
            clearTimeout(timeoutId);
            console.error('Products could not be loaded:', error);

            if (retryCount < maxRetries) {
                console.log('Retry: ' + (retryCount + 1) + '/' + maxRetries);
                setTimeout(function () { loadProducts(retryCount + 1); }, 2000 * (retryCount + 1));
                return;
            }

            var catContent = document.getElementById('categories-content');
            if (!catContent) return;

            var errorMsg = getTranslation('loading-error') || 'Could not load data';
            var errorDetail;
            if (error.name === 'AbortError' || (error.message && error.message.indexOf('timeout') !== -1)) {
                errorDetail = 'The request timed out. Please check your internet connection.';
            } else if (error.message && error.message.indexOf('Failed to fetch') !== -1) {
                errorDetail = 'Could not reach the server. Please check your internet connection.';
            } else if (error.message && error.message.indexOf('CORS') !== -1) {
                errorDetail = 'A CORS error occurred. Please try again later.';
            } else {
                errorDetail = error.message || 'An unknown error occurred.';
            }

            catContent.innerHTML = '<div class="no-products" style="text-align:center;padding:40px;">' +
                '<div style="color:#dc3545;margin-bottom:10px;font-weight:600;">' + errorMsg + '</div>' +
                '<div style="font-size:12px;color:#666;margin-bottom:15px;">' + errorDetail + '</div>' +
                '<button onclick="loadProducts(0)" style="padding:10px 20px;background:#009a96;color:white;border:none;border-radius:5px;cursor:pointer;font-size:14px;">Try again</button>' +
                '</div>';
        });
    }


    var quoteModalCloseTimer = null;

    function clearQuoteModalCloseTimer() {
        if (quoteModalCloseTimer) {
            clearTimeout(quoteModalCloseTimer);
            quoteModalCloseTimer = null;
        }
    }

    function forceCloseQuoteModal() {
        var popup = document.getElementById('quote-popup');
        var popupContent = document.querySelector('#quote-popup .quote-popup-content');
        if (popup) {
            popup.classList.add('is-hidden');
            popup.style.display = 'none';
        }
        if (popupContent) {
            popupContent.classList.remove('quote-closing');
        }
        document.body.style.overflow = '';
        document.body.style.position = '';
        document.body.style.width = '';
    }

    function closeQuoteModalAnimated() {
        var popup = document.getElementById('quote-popup');
        var popupContent = document.querySelector('#quote-popup .quote-popup-content');
        if (!popup || popup.classList.contains('is-hidden')) {
            forceCloseQuoteModal();
            return;
        }
        if (popupContent) {
            popupContent.classList.add('quote-closing');
        }
        setTimeout(function () {
            forceCloseQuoteModal();
        }, 360);
    }

    function isQuoteAcceptedResponse(r) {
        if (r && r.ok) return true;
        var parsed = null;
        try {
            parsed = JSON.parse(r && r.text ? r.text : '');
        } catch (e) {}
        if (!parsed) return false;
        if (parsed.success === true || parsed.Success === true || parsed.IsSuccess === true) return true;
        if (parsed.status === 'success' || parsed.Status === 'success') return true;
        if (parsed.Data && (parsed.Data.success === true || parsed.Data.Success === true || parsed.Data.IsSuccess === true)) return true;
        if (parsed.Data && (parsed.Data.TrackingNumber || parsed.Data.RequestNumber || parsed.Data.Price || parsed.Data.TotalPrice)) return true;
        var msg = String(parsed.message || parsed.Message || parsed.error || parsed.Error || '').toLowerCase();
        if (msg.indexOf('success') !== -1 || msg.indexOf('basar') !== -1 || msg.indexOf('alindi') !== -1) return true;
        return false;
    }

    function openQuoteModal() {
        var totalAdet = 0, totalHacim = 0, totalAgirlik = 0;
        var id, count, p, vol, ed, w;
        clearQuoteModalCloseTimer();
        for (id in productCounters) {
            if (!productCounters.hasOwnProperty(id)) continue;
            count = productCounters[id] || 0;
            if (count <= 0 || !productData[id]) continue;
            p = productData[id];
            vol = editedVolumes[id] !== undefined ? editedVolumes[id] : (p.Volume || 0);
            ed = editedDimensions[id];
            w = (ed && ed.weight !== undefined) ? parseFloat(ed.weight) : (p.Weight ? parseFloat(p.Weight) : 0);
            totalAdet += count;
            totalHacim += count * vol;
            totalAgirlik += count * w;
        }
        fillQuoteCartSummary(totalAdet, totalHacim, totalAgirlik);
        var resultEl = document.getElementById('quote-result');
        if (resultEl) resultEl.innerHTML = '';
        resetQuoteSendButtonState();

       

        var popup = document.getElementById('quote-popup');
        var popupContent = document.querySelector('#quote-popup .quote-popup-content');
        if (popup) {
            popup.classList.remove('is-hidden');
            popup.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            document.body.style.position = 'fixed';
            document.body.style.width = '100%';
        }
        if (popupContent) {
            popupContent.classList.remove('quote-closing');
        }
    }

    function closeQuoteModal() {
        clearQuoteModalCloseTimer();
        forceCloseQuoteModal();
    }

    function resetQuoteSendButtonState() {
        var btn = document.getElementById('quote-send-btn');
        if (!btn) return;
        btn.disabled = false;
        btn.classList.remove('sent');
        btn.textContent = getTranslation('quote-send-btn') || 'Send quote';
    }

    function fillQuoteCartSummary(adet, hacim, agirlik) {
        var el = document.getElementById('quote-cart-summary');
        if (!el) return;
        el.textContent = getTranslation('total-quantity') + ': ' + (adet || 0) + ' • ' +
            (getTranslation('total-volume') || 'Hacim') + ': ' + (hacim ? parseFloat(hacim).toFixed(2) : '0') + ' m³ • ' +
            (getTranslation('total-weight') || 'Weight') + ': ' + (agirlik ? parseFloat(agirlik).toFixed(1) : '0') + ' kg';
    }

    function toFixedNumber(value, digits) {
        var num = parseFloat(value);
        if (!isFinite(num)) return 0;
        return parseFloat(num.toFixed(digits));
    }

    function buildSourceDateText() {
        var now = new Date();
        var day = String(now.getDate()).padStart(2, '0');
        var month = String(now.getMonth() + 1).padStart(2, '0');
        var year = now.getFullYear();
        var hour = String(now.getHours()).padStart(2, '0');
        var minute = String(now.getMinutes()).padStart(2, '0');
        var second = String(now.getSeconds()).padStart(2, '0');

        return day + '.' + month + '.' + year + ' ' + hour + ':' + minute + ':' + second;
    }

    function getCurrentLanguageCode() {

        var raw = '';
        if (typeof navigator !== 'undefined') {
            raw = navigator.language || navigator.userLanguage || '';
        }
        raw = String(raw || '').toLowerCase().trim();
        if (!raw) return 'tr';
        if (raw.indexOf('-') !== -1) return raw.split('-')[0];
        if (raw.indexOf('_') !== -1) return raw.split('_')[0];
        return raw.length > 2 ? raw.slice(0, 2) : raw;
    }

    function getRequestTypeFromHash() {



        var hash = (location.hash || '').replace(/^#/, '').toLowerCase().trim();
        if (hash === 'zati') return 'CA';
        if (hash === 'mobilya') return 'CO';
        if (hash === 'ticari') return 'FU';
        if (hash === 'kargo') return 'RE';
        if (hash === 'arac' || hash === 'vehicle') return 'AU';
        return 'RE';
    }

    function getTrackingNumber() {
        var now = new Date();
        return 'WEB' + now.getFullYear() +
            String(now.getMonth() + 1).padStart(2, '0') +
            String(now.getDate()).padStart(2, '0') +
            String(now.getHours()).padStart(2, '0') +
            String(now.getMinutes()).padStart(2, '0') +
            String(now.getSeconds()).padStart(2, '0');
    }

    function guessCityFromAddress(addressText) {
        if (!addressText) return '';
        var trimmed = String(addressText).trim();
        if (!trimmed) return '';
        var parts = trimmed.split(',');
        return (parts[0] || '').trim();
    }

    function buildLocationObject(addressText, countryCode, isFromLocation) {
        var location = {
            Country: countryCode || '',
            City: guessCityFromAddress(addressText),
            Town: '',
            PostCode: '',
            GateNumber: '',
            AddresText: addressText || '',
            HasLoadElevator: false,
            MovingDistance: 0,
            FlatLevel: 0,
            DoWeHaveSpecialService: false,
            SpecialServiceDescription: '',
            SpecialServicePrice: 0,
            HasFreeParkingArea: false
        };
        if (isFromLocation) {
            location.WillWeDoDisassembly = false;
            location.WillWeDoPackaging = true;
            location.LoadingPlace = null;
        } else {
            location.WillWeDoAssembly = false;
            location.WillWeDoUnPackaging = false;
        }
        return location;
    }

    function getQuotePayloadFromGo1ilz() {
        var firstGroup = '';
        var totalAdet = 0, totalHacim = 0, totalAgirlik = 0;
        var requestDetails = [];
        var id, count, p, vol, ed, w, itemName;
        for (id in productCounters) {
            if (!productCounters.hasOwnProperty(id)) continue;
            count = productCounters[id] || 0;
            if (count <= 0 || !productData[id]) continue;
            p = productData[id];
            if (!firstGroup && p.ProductGroup) firstGroup = p.ProductGroup;
            vol = editedVolumes[id] !== undefined ? parseFloat(editedVolumes[id]) : parseFloat(p.Volume || 0);
            ed = editedDimensions[id];
            w = (ed && ed.weight !== undefined) ? parseFloat(ed.weight) : (p.Weight ? parseFloat(p.Weight) : 0);
            totalAdet += count;
            totalHacim += count * (isFinite(vol) ? vol : 0);
            totalAgirlik += count * (isFinite(w) ? w : 0);
            itemName = getTextByLang(p.Name) || '';
            requestDetails.push({
                ItemCode: p.Code || '',
                ItemDescription: itemName,
                ItemGroup: p.ProductGroup || null,
                ItemNotes: '',
                WillWeDoSpecialPackaging: false,
                UnitType: 'Collies',
                IsStackable: false,
                ActualTotalQuantity: count,
                ExpMinTotalWeight: 0,
                ExpMaxTotalWeight: 0,
                ActualTotalWeight: toFixedNumber(count * w, 4),
                ExpMinTotalVolume: toFixedNumber(count * vol, 4),
                ExpMaxTotalVolume: toFixedNumber(count * vol, 4),
                ActualTotalVolume: toFixedNumber(count * vol, 4),
                Ladameter: 0
            });
        }
        var fromAddress = (document.getElementById('quote-from') && document.getElementById('quote-from').value) || '';
        var toAddress = (document.getElementById('quote-to') && document.getElementById('quote-to').value) || '';
        var name = (document.getElementById('quote-name') && document.getElementById('quote-name').value) || '';
        var email = (document.getElementById('quote-email') && document.getElementById('quote-email').value) || '';
        var phone = (document.getElementById('quote-phone') && document.getElementById('quote-phone').value) || '';
        var message = (document.getElementById('quote-message') && document.getElementById('quote-message').value) || '';
        var normalizedVolume = toFixedNumber(totalHacim, 4);
        var normalizedWeight = toFixedNumber(totalAgirlik, 4);
        var languageCode = getCurrentLanguageCode();
        var requestType = getRequestTypeFromHash();
        return {
            SourceDetail: {
                Company: 'WEBSITE',
                MACAddress: 'hanbroscargo.com',
                IP: window.location.hostname || '',
                Date: buildSourceDateText(),
                Language: languageCode
            },
            RequestMaster: {
                TrackingNumber: getTrackingNumber(),
                Status: 'Reservation',
                RequestType: requestType,
                OrderType: 'Musteriden Teslim Alinacak',
                ExpShipmentDate: '',
                CustomerCode: phone || '',
                CustomerName: name || '',
                CustomerNumber: phone || '',
                CustomerEmail: email || '',
                ReceiverCode: phone || '',
                ReceiverName: name || '',
                ReceiverNumber: phone || '',
                ReceiverEmail: email || '',
                WeCanContactViaEmail: true,
                WeCanContactViaPhone: true,
                ActualTotalQuantity: totalAdet,
                ExpMinTotalWeight: 0,
                ExpMaxTotalWeight: 0,
                ActualTotalWeight: normalizedWeight,
                ExpMinTotalVolume: normalizedVolume,
                ExpMaxTotalVolume: normalizedVolume,
                ActualTotalVolume: normalizedVolume,
                ActualTotalLadameter: 0,
                TargetCustomResponsibility: '',
                OriginCustomResponsibility: '',
                CustomerHasEORINumber: true,
                TruckCanVisitTargetLocation: true,
                PriceCalculationType: '',
                LogisticsSite: 'GZT',
                Message: message,
                ProductGroup: firstGroup || 'SALON / LOUNGE'
            },
            FromLocation: buildLocationObject(fromAddress, 'TR', true),
            ToLocation: buildLocationObject(toAddress, 'DE', false),
            RequestDetails: requestDetails
        };
    }

    function sendQuoteFromGo1ilz(event) {
        if (event) event.preventDefault();
        var btn = document.getElementById('quote-send-btn');
        var resultEl = document.getElementById('quote-result');
        clearQuoteModalCloseTimer();
        if (btn) {
            btn.disabled = true;
            btn.classList.remove('sent');
            btn.textContent = getTranslation('quote-sending') || 'Sending...';
        }
        if (resultEl) resultEl.innerHTML = '';
        var payload = getQuotePayloadFromGo1ilz();
        fetch(GO1ILZ_API_BASE + '/price', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(function (res) {
            return res.text().then(function (text) {
                return { ok: res.ok, status: res.status, text: text };
            });
        })
        .then(function (r) {
            if (btn) {
                btn.disabled = false;
                btn.classList.remove('sent');
                btn.textContent = getTranslation('quote-send-btn') || 'Send quote';
            }
            if (isQuoteAcceptedResponse(r)) {
                if (resultEl) {
                    resultEl.className = 'quote-result success';
                    resultEl.textContent = getTranslation('quote-success') || 'Your quote request was received.';
                }
                if (btn) {

                    btn.classList.add('sent');
                    btn.textContent = 'Talebiniz alindi';
                }

                quoteModalCloseTimer = setTimeout(function () {
                    closeQuoteModalAnimated();
                    resetQuoteSendButtonState();
                    var currentResult = document.getElementById('quote-result');
                    if (currentResult) currentResult.innerHTML = '';
                }, 5000);
            } else {
                var errData = null;
                try { errData = JSON.parse(r.text); } catch (e) {}
                var errMsg;
                if (errData && (errData.code === 'ENDPOINT_NOT_AVAILABLE' || r.status === 503)) {
                    errMsg = getTranslation('quote-error-service-unavailable') || (errData && errData.error) || '';
                } else {
                    errMsg = (errData && (errData.message || errData.Message || errData.error || errData.Error)) ||
                        (r.text && !r.text.trim().startsWith('<') ? r.text : '') || 'HTTP ' + r.status;
                }
                if (resultEl) {
                    resultEl.className = 'quote-result error';
                    resultEl.textContent = errMsg || (getTranslation('quote-error') || 'Send failed.');
                }
                resetQuoteSendButtonState();
            }
        })
        .catch(function (err) {
            if (btn) {
                btn.disabled = false;
                btn.classList.remove('sent');
                btn.textContent = getTranslation('quote-send-btn') || 'Send quote';
            }
            if (resultEl) {
                resultEl.className = 'quote-result error';
                resultEl.textContent = (getTranslation('quote-error') || 'Send failed.') + ' ' + (err && err.message ? err.message : '');
            }
        });
        return false;
    }

    setTimeout(function () {
        updateClearCartButtonText();
        loadProducts(0);
    }, 100);
</script>
